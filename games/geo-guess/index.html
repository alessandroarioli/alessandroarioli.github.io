<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Geo Guess</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: #fafafa;
            overflow: hidden;
        }

        #app {
            position: relative;
            width: 480px;
            max-width: 100vw;
            text-align: center;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 50%;
            cursor: pointer;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 4px;
            letter-spacing: -0.02em;
        }
        h1 span { color: #34d399; }

        .subtitle {
            color: #a1a1aa;
            font-size: 0.9rem;
            margin-bottom: 20px;
        }

        #hud {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin: 16px 0;
        }

        .hud-item {
            background: rgba(255,255,255,0.06);
            padding: 6px 16px;
            border-radius: 8px;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .hud-item .label { color: #a1a1aa; font-weight: 400; font-size: 0.8rem; }
        .hud-item .val { color: #34d399; }
        .hud-item .val.wrong { color: #ef4444; }

        #message {
            min-height: 36px;
            font-size: 1.1rem;
            font-weight: 600;
            margin: 12px 0;
            transition: color 0.2s;
        }
        #message.correct { color: #34d399; }
        #message.wrong { color: #ef4444; }
        #message.info { color: #818cf8; }

        #choices {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 0 12px;
            margin-bottom: 16px;
        }

        .choice-btn {
            padding: 12px 8px;
            border: 1px solid #27272a;
            border-radius: 10px;
            background: rgba(255,255,255,0.04);
            color: #fafafa;
            font-size: 0.95rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s;
        }
        .choice-btn:hover:not(:disabled) {
            border-color: #818cf8;
            background: rgba(129,140,248,0.1);
            transform: translateY(-1px);
        }
        .choice-btn:disabled { cursor: default; opacity: 0.7; }
        .choice-btn.correct-choice { border-color: #34d399; background: rgba(52,211,153,0.15); color: #34d399; }
        .choice-btn.wrong-choice { border-color: #ef4444; background: rgba(239,68,68,0.1); color: #ef4444; }

        .action-btn {
            padding: 12px 32px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
            margin: 4px;
        }
        .action-btn:hover { transform: translateY(-2px); }
        .action-btn.primary { background: #6366f1; color: white; }
        .action-btn.green { background: #059669; color: white; }

        .back-link {
            display: inline-block;
            margin-top: 12px;
            color: #71717a;
            text-decoration: none;
            font-size: 0.85rem;
            border: 1px solid #27272a;
            padding: 6px 16px;
            border-radius: 6px;
            transition: color 0.2s;
        }
        .back-link:hover { color: #a1a1aa; }

        #startOverlay {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(10,10,26,0.92);
            z-index: 10;
            border-radius: 12px;
            padding: 24px;
        }
        #startOverlay.hidden { display: none; }
        #startOverlay p { color: #a1a1aa; margin-bottom: 20px; font-size: 0.95rem; line-height: 1.6; }
        .controls-hint { color: #71717a; font-size: 0.8rem; margin-top: 12px; }

        @media (max-width: 500px) {
            canvas { width: 320px !important; height: 320px !important; }
            h1 { font-size: 1.4rem; }
            .choice-btn { font-size: 0.85rem; padding: 10px 6px; }
        }
    </style>
</head>
<body>
<div id="app">
    <h1>&#127758; Geo <span>Guess</span></h1>
    <p class="subtitle">Where in the world did the pin land?</p>

    <canvas id="globe" width="380" height="380"></canvas>

    <div id="hud">
        <div class="hud-item"><span class="label">Score</span> <span class="val" id="scoreVal">0</span></div>

        <div class="hud-item"><span class="label">Streak</span> <span class="val" id="streakVal">0</span></div>
    </div>

    <div id="message" class="info">Click the globe to spin!</div>

    <div id="choices"></div>

    <div id="actionArea">

    </div>

        <button class="action-btn primary" id="startBtn">Start Game</button>

// ---- GLOBE SETUP ----
const canvas = document.getElementById('globe');
const ctx = canvas.getContext('2d');
const CX = canvas.width / 2;
const CY = canvas.height / 2;
const R = 175; // globe radius

let rotation = 0; // current longitude offset in radians
let spinVelocity = 0;
let targetCountry = null;
let pinVisible = false;
let gamePhase = 'idle'; // idle, spinning, guessing, result, gameover
let roundNum = 0;
let totalRounds = 10;
let scoreVal = 0;
let streak = 0;
let usedCountries = [];
let animFrame = null;
let idleRotation = 0;

// ---- PROJECTION ----
function project(lat, lng) {
    let latR = lat * Math.PI / 180;
    let lngR = lng * Math.PI / 180 + rotation;
    let x = R * Math.cos(latR) * Math.sin(lngR);
    let y = -R * Math.sin(latR);
    let z = Math.cos(latR) * Math.cos(lngR);
    return { x: CX + x, y: CY + y, visible: z > 0 };
}

// ---- DRAWING ----
function drawGlobe() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    // Space background
    ctx.fillStyle = '#06061a';
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Stars
    for (let i = 0; i < 80; i++) {
        let sx = (i * 137.5 + 20) % canvas.width;
        let sy = (i * 97.3 + 10) % canvas.height;
        let br = 0.2 + (Math.sin(Date.now() * 0.001 + i) + 1) * 0.15;
        ctx.fillStyle = `rgba(255,255,255,${br})`;
        ctx.fillRect(sx, sy, 1.2, 1.2);
    }

    // Globe glow
    let glowGrad = ctx.createRadialGradient(CX, CY, R - 10, CX, CY, R + 40);
    glowGrad.addColorStop(0, 'rgba(52,211,153,0.06)');
    glowGrad.addColorStop(1, 'rgba(52,211,153,0)');
    ctx.fillStyle = glowGrad;
    ctx.beginPath(); ctx.arc(CX, CY, R + 40, 0, Math.PI * 2); ctx.fill();

    // Ocean
    let oceanGrad = ctx.createRadialGradient(CX - 30, CY - 30, 10, CX, CY, R);
    oceanGrad.addColorStop(0, '#1e6091');
    oceanGrad.addColorStop(0.7, '#1a4d73');
    oceanGrad.addColorStop(1, '#0d3b5e');
    ctx.fillStyle = oceanGrad;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.fill();

    // Clip to globe
    ctx.save();
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.clip();

    // Grid lines (meridians and parallels)
    ctx.strokeStyle = 'rgba(255,255,255,0.06)';
    ctx.lineWidth = 0.5;
    // Parallels
    for (let lat = -60; lat <= 60; lat += 30) {
        ctx.beginPath();
        for (let lng = -180; lng <= 180; lng += 3) {
            let p = project(lat, lng);
            if (lng === -180) ctx.moveTo(p.x, p.y);
            else if (p.visible) ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
    }
    // Meridians
    for (let lng = -180; lng < 180; lng += 30) {
        ctx.beginPath();
        for (let lat = -90; lat <= 90; lat += 3) {
            let p = project(lat, lng);
            if (lat === -90) ctx.moveTo(p.x, p.y);
            else if (p.visible) ctx.lineTo(p.x, p.y);
        }
        ctx.stroke();
    }

    // Draw continents
    let landColors = ['#2d8a4e','#2a7f47','#348f52','#2d8a4e','#2a7f47','#348f52','#2d8a4e'];
    CONTINENTS.forEach((continent, ci) => {
        continent.forEach(poly => {
            ctx.fillStyle = landColors[ci % landColors.length];
            ctx.strokeStyle = '#1e6b38';
            ctx.lineWidth = 0.8;
            ctx.beginPath();
            let started = false;
            let anyVisible = false;
            for (let i = 0; i < poly.length; i++) {
                let p = project(poly[i][0], poly[i][1]);
                if (p.visible) anyVisible = true;
                if (!started) { ctx.moveTo(p.x, p.y); started = true; }
                else ctx.lineTo(p.x, p.y);
            }
            if (anyVisible) {
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            }
        });
    });

    // Pin
    if (pinVisible && targetCountry) {
        let p = project(targetCountry[1], targetCountry[2]);
        if (p.visible) {
            // Pin shadow
            ctx.fillStyle = 'rgba(0,0,0,0.3)';
            ctx.beginPath(); ctx.ellipse(p.x + 2, p.y + 2, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

            // Pin stick
            ctx.strokeStyle = '#991b1b';
            ctx.lineWidth = 2.5;
            ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p.x, p.y - 26); ctx.stroke();

            // Pin head
            ctx.fillStyle = '#ef4444';
            ctx.shadowColor = '#ef4444';
            ctx.shadowBlur = 10;
            ctx.beginPath(); ctx.arc(p.x, p.y - 26, 8, 0, Math.PI * 2); ctx.fill();
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#fca5a5';
            ctx.beginPath(); ctx.arc(p.x - 2, p.y - 28, 3, 0, Math.PI * 2); ctx.fill();

            // Pulse ring
            let pulse = (Date.now() % 1500) / 1500;
            ctx.strokeStyle = `rgba(239,68,68,${0.6 - pulse * 0.6})`;
            ctx.lineWidth = 2;
            ctx.beginPath(); ctx.arc(p.x, p.y, 8 + pulse * 20, 0, Math.PI * 2); ctx.stroke();
        }
    }

    ctx.restore();

    // Atmosphere rim
    ctx.strokeStyle = 'rgba(100,200,255,0.15)';
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.stroke();

    // Specular highlight
    let specGrad = ctx.createRadialGradient(CX - 60, CY - 60, 10, CX - 40, CY - 40, R);
    specGrad.addColorStop(0, 'rgba(255,255,255,0.12)');
    specGrad.addColorStop(0.4, 'rgba(255,255,255,0)');
    ctx.fillStyle = specGrad;
    ctx.beginPath(); ctx.arc(CX, CY, R, 0, Math.PI * 2); ctx.fill();
}

// ---- GAME LOGIC ----
function pickCountry() {
    let available = COUNTRIES.filter(c => !usedCountries.includes(c[0]));
    if (available.length === 0) {
        usedCountries = [];
        available = COUNTRIES;
    }
    let c = available[Math.floor(Math.random() * available.length)];
    usedCountries.push(c[0]);
    return c;
}

function getChoices(correct) {
    // Get 3 wrong answers, prefer same-ish region
    let correctLat = correct[1], correctLng = correct[2];
    let others = COUNTRIES.filter(c => c[0] !== correct[0]);

    // Sort by distance, pick some nearby and some random
    others.sort((a, b) => {
        let da = Math.abs(a[1] - correctLat) + Math.abs(a[2] - correctLng);
        let db = Math.abs(b[1] - correctLat) + Math.abs(b[2] - correctLng);
        return da - db;
    });

    let nearby = others.slice(0, 15);
    let wrong = [];
    while (wrong.length < 3) {
        let pool = wrong.length < 2 ? nearby : others;
        let pick = pool[Math.floor(Math.random() * pool.length)];
        if (!wrong.find(w => w[0] === pick[0])) wrong.push(pick);
    }

    let choices = [correct, ...wrong];
    // Shuffle
    for (let i = choices.length - 1; i > 0; i--) {
        let j = Math.floor(Math.random() * (i + 1));
        [choices[i], choices[j]] = [choices[j], choices[i]];
    }
    return choices;
}

function startSpin() {
    targetCountry = pickCountry();
    pinVisible = false;
    gamePhase = 'spinning';
    roundNum++;
    updateHUD();

    // Calculate target rotation to face the country
    let targetLng = -targetCountry[2] * Math.PI / 180;
    // Spin several full rotations + land on target
    spinVelocity = 0.08 + Math.random() * 0.04;

    let currentRot = rotation % (Math.PI * 2);
    let totalSpin = Math.PI * 6 + (targetLng - currentRot); // ~3 full spins + offset

    let spinDuration = 120 + Math.floor(Math.random() * 40); // frames
    let frame = 0;

    setMessage('Spinning...', 'info');
    clearChoices();

    function spinStep() {
        frame++;
        let t = frame / spinDuration;
        // Ease out cubic
        let ease = 1 - Math.pow(1 - t, 3);
        rotation = currentRot + totalSpin * ease;

        drawGlobe();

        if (frame < spinDuration) {
            animFrame = requestAnimationFrame(spinStep);
        } else {
            rotation = currentRot + totalSpin;
            pinVisible = true;
            gamePhase = 'guessing';
            drawGlobe();
            showChoices();
            setMessage('Where did the pin land?', 'info');
        }
    }

    if (animFrame) cancelAnimationFrame(animFrame);
    spinStep();
}

function showChoices() {
    let choices = getChoices(targetCountry);
    let container = document.getElementById('choices');
    container.innerHTML = '';

    choices.forEach(c => {
        let btn = document.createElement('button');
        btn.className = 'choice-btn';
        btn.textContent = c[0];
        btn.onclick = () => handleGuess(c, btn);
        container.appendChild(btn);
    });
}

function clearChoices() {
    document.getElementById('choices').innerHTML = '';
}

function handleGuess(chosen, btn) {
    if (gamePhase !== 'guessing') return;
    gamePhase = 'result';

    let allBtns = document.querySelectorAll('.choice-btn');
    allBtns.forEach(b => b.disabled = true);

    if (chosen[0] === targetCountry[0]) {
        btn.classList.add('correct-choice');
        streak++;
        let pts = 100 + streak * 20;
        scoreVal += pts;
        setMessage(`Correct! +${pts} points`, 'correct');
    } else {
        btn.classList.add('wrong-choice');
        streak = 0;
        // Highlight correct
        allBtns.forEach(b => {
            if (b.textContent === targetCountry[0]) b.classList.add('correct-choice');
        });
        setMessage(`Wrong! It was ${targetCountry[0]}`, 'wrong');
    }

    updateHUD();

    setTimeout(() => {
        if (roundNum >= totalRounds) {
            endGame();
        } else {
            startSpin();
        }
    }, 2000);
}

function endGame() {
    gamePhase = 'gameover';
    clearChoices();
    let pct = Math.round(scoreVal / (totalRounds * 120) * 100);
    let emoji = pct >= 80 ? '&#127942;' : pct >= 50 ? '&#128170;' : '&#128064;';
    setMessage(`${emoji} Final Score: ${scoreVal}`, 'info');

    let area = document.getElementById('actionArea');
    area.innerHTML = `
        <button class="action-btn green" onclick="newGame()">Play Again</button>
        <br><a href="/" class="back-link">Back to Portfolio</a>
    `;
}

function newGame() {
    scoreVal = 0; streak = 0; roundNum = 0;
    usedCountries = [];
    rotation = 0;
    pinVisible = false;
    updateHUD();
    document.getElementById('actionArea').innerHTML = '<a href="/" class="back-link">Back to Portfolio</a>';
    startSpin();
}

function setMessage(text, cls) {
    let el = document.getElementById('message');
    el.innerHTML = text;
    el.className = cls;
}

function updateHUD() {
    document.getElementById('scoreVal').textContent = scoreVal;
    document.getElementById('roundVal').textContent = `${Math.min(roundNum, totalRounds)}/${totalRounds}`;
    document.getElementById('streakVal').textContent = streak;
}

// ---- IDLE ANIMATION ----
function idleLoop() {
    if (gamePhase === 'idle') {
        rotation += 0.005;
        drawGlobe();
    }
    animFrame = requestAnimationFrame(idleLoop);
}

// ---- INIT ----
document.getElementById('startBtn').addEventListener('click', () => {
    document.getElementById('startOverlay').classList.add('hidden');
    if (animFrame) cancelAnimationFrame(animFrame);
    newGame();
});

// Start idle rotation
idleLoop();
</script>
